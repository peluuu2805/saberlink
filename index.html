<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000814">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SABERLINK</title>
<meta name="theme-color" content="#060008">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SaberLink">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<script>
// Registrar Service Worker para PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(r => console.log('SW registrado'))
      .catch(e => console.log('SW error:', e));
  });
}
</script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* =========================================
   RESET & BASE
========================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent:     #00D4FF;
  --accent2:    #0066FF;
  --bg:         #000814;
  --bg2:        #000d24;
  --panel:      rgba(0, 20, 50, 0.75);
  --border:     rgba(0, 212, 255, 0.35);
  --danger:     #FF2244;
  --saber-color: #00FF40;
  --text:       #c8e8ff;
  --dim:        #4a7a9b;
  --font-head:  'Orbitron', monospace;
  --font-data:  'Share Tech Mono', monospace;
}

html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-data);
  overflow-x: hidden;
  overscroll-behavior: none;
}

/* =========================================
   STARFIELD
========================================= */
#stars-canvas {
  position: fixed; inset: 0;
  z-index: 0; pointer-events: none;
}

/* =========================================
   SCANLINE OVERLAY
========================================= */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 1;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events: none;
}

/* =========================================
   MAIN WRAPPER
========================================= */
#app {
  position: relative; z-index: 2;
  min-height: 100vh;
  display: flex; flex-direction: column;
  max-width: 480px; margin: 0 auto;
  padding: 0 16px 24px;
}

/* =========================================
   HEADER
========================================= */
header {
  display: flex; align-items: center;
  justify-content: space-between;
  padding: 16px 0 8px;
  border-bottom: 1px solid var(--border);
}
.logo {
  font-family: var(--font-head);
  font-size: 1.4rem; font-weight: 900;
  letter-spacing: 0.15em;
  color: var(--accent);
  text-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent2);
}
.logo span { color: #fff; }

#conn-status {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.65rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--dim);
}
#conn-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--dim);
  box-shadow: 0 0 6px var(--dim);
  transition: all 0.4s;
}
#conn-dot.connected { background: #00FF80; box-shadow: 0 0 10px #00FF80; }
#conn-dot.connecting { background: #FFD700; box-shadow: 0 0 10px #FFD700; animation: pulse 1s infinite; }

/* =========================================
   CONNECT SCREEN
========================================= */
#screen-connect {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 32px;
}

.holo-emblem {
  position: relative; width: 160px; height: 160px;
}
.holo-emblem .ring {
  position: absolute; border-radius: 50%;
  border: 2px solid var(--accent);
  opacity: 0.6; animation: spin 8s linear infinite;
}
.holo-emblem .ring:nth-child(1) { inset: 0; }
.holo-emblem .ring:nth-child(2) { inset: 16px; animation-duration: 5s; animation-direction: reverse; opacity: 0.4; }
.holo-emblem .ring:nth-child(3) { inset: 32px; animation-duration: 12s; opacity: 0.3; }
.holo-emblem .core {
  position: absolute; inset: 44px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,212,255,0.3) 0%, transparent 70%);
  border: 2px solid rgba(0,212,255,0.8);
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem;
  animation: breathe 3s ease-in-out infinite;
}

.connect-title {
  font-family: var(--font-head); font-size: 1rem;
  letter-spacing: 0.25em; color: var(--dim);
  text-align: center;
}
.connect-subtitle {
  font-size: 0.7rem; letter-spacing: 0.15em;
  color: rgba(0,212,255,0.5); text-align: center;
  margin-top: -24px;
}

#btn-connect {
  position: relative;
  padding: 16px 48px;
  font-family: var(--font-head); font-size: 0.85rem;
  font-weight: 700; letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--bg); background: var(--accent);
  border: none; cursor: pointer;
  clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
  transition: all 0.2s;
  text-shadow: none;
  box-shadow: 0 0 30px rgba(0,212,255,0.5);
}
#btn-connect:hover { background: #fff; box-shadow: 0 0 50px rgba(0,212,255,0.8); }
#btn-connect:active { transform: scale(0.96); }
#btn-connect:disabled { opacity: 0.5; cursor: not-allowed; }

/* =========================================
   MAIN SCREEN
========================================= */
#screen-main { display: none; flex-direction: column; gap: 16px; padding-top: 16px; }
#screen-main.visible { display: flex; }

/* SABER PREVIEW */
.saber-stage {
  display: flex; flex-direction: column;
  align-items: center; gap: 12px;
  padding: 24px 0 16px;
}
.saber-wrap {
  position: relative; width: 12px; height: 200px;
  display: flex; flex-direction: column;
}
#saber-blade {
  flex: 1; border-radius: 6px 6px 0 0;
  background: linear-gradient(to top,
    var(--saber-color),
    rgba(255,255,255,0.95) 50%,
    var(--saber-color)
  );
  box-shadow:
    0 0 8px var(--saber-color),
    0 0 20px var(--saber-color),
    0 0 50px var(--saber-color),
    0 0 80px rgba(255,255,255,0.3);
  transform-origin: bottom center;
  transition: background 0.5s, box-shadow 0.5s;
  animation: flicker 0.1s infinite;
}
#saber-blade.off {
  background: #111;
  box-shadow: none;
  animation: none;
}
.saber-hilt {
  width: 20px; height: 36px; margin: 0 -4px;
  background: linear-gradient(135deg, #888, #333, #aaa, #444);
  border-radius: 3px;
  border: 1px solid #666;
}

.saber-state-label {
  font-family: var(--font-head); font-size: 0.65rem;
  letter-spacing: 0.3em; color: var(--dim);
  text-transform: uppercase;
}
#saber-state-text {
  color: var(--accent);
  text-shadow: 0 0 10px var(--accent);
  transition: color 0.4s;
}

/* ON/OFF BUTTON */
.power-row { display: flex; justify-content: center; }
#btn-power {
  width: 100px; height: 100px; border-radius: 50%;
  font-family: var(--font-head); font-size: 0.75rem;
  font-weight: 700; letter-spacing: 0.15em;
  border: 3px solid var(--accent);
  background: transparent; color: var(--accent);
  cursor: pointer;
  box-shadow: 0 0 20px rgba(0,212,255,0.3), inset 0 0 20px rgba(0,212,255,0.1);
  transition: all 0.3s;
  text-shadow: 0 0 10px var(--accent);
  position: relative; overflow: hidden;
}
#btn-power::before {
  content: '';
  position: absolute; inset: 0; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,212,255,0.1) 0%, transparent 70%);
}
#btn-power.saber-on {
  border-color: var(--danger);
  color: var(--danger);
  box-shadow: 0 0 30px rgba(255,34,68,0.4), inset 0 0 20px rgba(255,34,68,0.1);
  text-shadow: 0 0 10px var(--danger);
}
#btn-power:active { transform: scale(0.93); }

/* PANELS */
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 16px;
  position: relative;
}
.panel::before, .panel::after {
  content: '';
  position: absolute;
  width: 12px; height: 12px;
  border-color: var(--accent);
  border-style: solid;
  opacity: 0.8;
}
.panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
.panel::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

.panel-title {
  font-family: var(--font-head); font-size: 0.6rem;
  letter-spacing: 0.35em; color: var(--accent);
  text-transform: uppercase; margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
}
.panel-title::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(to right, var(--border), transparent);
}

/* COLOR PRESETS */
.crystal-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 10px; margin-bottom: 14px;
}
.crystal-btn {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 5px; padding: 12px 6px;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.1);
  cursor: pointer; transition: all 0.25s;
  font-family: var(--font-data);
  position: relative; overflow: hidden;
}
.crystal-btn:active { transform: scale(0.93); }
.crystal-btn.active {
  border-color: var(--crystal-color, #fff);
  box-shadow: 0 0 16px var(--crystal-color, #fff),
              inset 0 0 16px rgba(255,255,255,0.05);
}
.crystal-swatch {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--crystal-color, #fff);
  box-shadow: 0 0 10px var(--crystal-color, #fff);
  transition: box-shadow 0.3s;
}
.crystal-btn.active .crystal-swatch {
  box-shadow: 0 0 20px var(--crystal-color, #fff), 0 0 40px var(--crystal-color, #fff);
}
.crystal-name {
  font-size: 0.6rem; font-weight: 700;
  letter-spacing: 0.1em; color: #fff;
  text-transform: uppercase;
}
.crystal-char {
  font-size: 0.55rem; color: var(--dim);
  letter-spacing: 0.05em;
}

/* CUSTOM COLOR */
.custom-color-row {
  display: flex; align-items: center; gap: 10px;
}
.custom-color-row label {
  font-size: 0.65rem; letter-spacing: 0.1em;
  color: var(--dim); white-space: nowrap;
  text-transform: uppercase;
}
#custom-color-picker {
  flex: 1; height: 36px; border: 1px solid var(--border);
  background: none; cursor: pointer; padding: 2px;
  border-radius: 2px;
}
#btn-apply-color {
  padding: 8px 16px;
  font-family: var(--font-head); font-size: 0.6rem;
  letter-spacing: 0.1em; font-weight: 700;
  background: transparent;
  border: 1px solid var(--accent); color: var(--accent);
  cursor: pointer; transition: all 0.2s;
  white-space: nowrap;
}
#btn-apply-color:hover { background: var(--accent); color: var(--bg); }

/* SOUND PACKS */
.pack-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.pack-btn {
  display: flex; flex-direction: column; gap: 4px;
  padding: 12px; border: 1px solid rgba(255,255,255,0.08);
  background: rgba(0,0,0,0.4); cursor: pointer;
  transition: all 0.25s; position: relative;
  overflow: hidden;
}
.pack-btn::before {
  content: var(--pack-icon, '◆');
  position: absolute; right: 10px; top: 8px;
  font-size: 1.2rem; opacity: 0.15;
}
.pack-btn.active {
  border-color: var(--accent);
  background: rgba(0,212,255,0.08);
  box-shadow: 0 0 14px rgba(0,212,255,0.2);
}
.pack-btn:active { transform: scale(0.96); }
.pack-name {
  font-family: var(--font-head); font-size: 0.62rem;
  letter-spacing: 0.12em; color: #fff;
  text-transform: uppercase;
}
.pack-desc { font-size: 0.58rem; color: var(--dim); }
.pack-active-badge {
  display: none; font-size: 0.5rem; letter-spacing: 0.15em;
  color: var(--accent); text-transform: uppercase; margin-top: 2px;
}
.pack-btn.active .pack-active-badge { display: block; }

/* STATUS BAR */
.status-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0;
  font-size: 0.6rem; letter-spacing: 0.1em;
  color: var(--dim); border-top: 1px solid var(--border);
}
.status-item { display: flex; align-items: center; gap: 6px; }
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
  animation: pulse 2s infinite;
}

/* =========================================
   TOAST NOTIFICATION
========================================= */
#toast {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(0,20,50,0.95);
  border: 1px solid var(--accent);
  color: var(--accent); padding: 10px 24px;
  font-size: 0.7rem; letter-spacing: 0.15em;
  text-transform: uppercase;
  opacity: 0; transition: all 0.3s;
  pointer-events: none; white-space: nowrap;
  z-index: 100;
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* =========================================
   ANIMATIONS
========================================= */
@keyframes spin     { to { transform: rotate(360deg); } }
@keyframes breathe  { 0%,100% { opacity:0.7; } 50% { opacity:1; } }
@keyframes pulse    { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
@keyframes flicker  {
  0%,100% { opacity: 1; }
  92%     { opacity: 0.92; }
  94%     { opacity: 0.98; }
  96%     { opacity: 0.91; }
}
@keyframes fadeIn   { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
#screen-main.visible { animation: fadeIn 0.5s ease; }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<div id="app">

  <!-- HEADER -->
  <header>
    <div class="logo">SABER<span>LINK</span></div>
    <div id="conn-status">
      <div id="conn-dot"></div>
      <span id="conn-label">DESCONECTADO</span>
    </div>
  </header>

  <!-- PANTALLA DE CONEXIÓN -->
  <div id="screen-connect">
    <div class="holo-emblem">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="core">⚔️</div>
    </div>
    <div>
      <div class="connect-title">CONTROL DE SABLE LÁSER</div>
    </div>
    <div class="connect-subtitle">SISTEMA DE CONTROL KYBER — v3.1</div>
    <button id="btn-connect" onclick="connectBLE()">▶ CONECTAR AL SABLE</button>
  </div>

  <!-- PANTALLA PRINCIPAL -->
  <div id="screen-main">

    <!-- SABER PREVIEW -->
    <div class="saber-stage">
      <div class="saber-wrap">
        <div id="saber-blade" class="off"></div>
        <div class="saber-hilt"></div>
      </div>
      <div class="saber-state-label">ESTADO: <span id="saber-state-text">INACTIVO</span></div>
    </div>

    <!-- BOTÓN DE ENCENDIDO -->
    <div class="power-row">
      <button id="btn-power" onclick="togglePower()">ENCENDER</button>
    </div>

    <!-- PANEL DE COLOR -->
    <div class="panel">
      <div class="panel-title">Cristal Kyber — Color</div>

      <div class="crystal-grid" id="crystal-grid">
        <!-- Generado por JS -->
      </div>

      <div class="custom-color-row">
        <label>Color libre</label>
        <input type="color" id="custom-color-picker" value="#00ff40">
        <button id="btn-apply-color" onclick="applyCustomColor()">APLICAR</button>
      </div>
    </div>

    <!-- PANEL DE SONIDO -->
    <div class="panel">
      <div class="panel-title">Perfil de Sonido</div>
      <div class="pack-grid" id="pack-grid">
        <!-- Generado por JS -->
      </div>
    </div>

    <!-- BARRA DE ESTADO -->
    <div class="status-bar">
      <div class="status-item">
        <div class="status-dot"></div>
        <span>BLE ACTIVO</span>
      </div>
      <span id="status-device">SableLaser</span>
      <span id="status-time">--:--</span>
    </div>

  </div><!-- /screen-main -->
</div><!-- /app -->

<div id="toast"></div>

<script>
// =========================================
// CONFIGURACIÓN BLE
// =========================================
const BLE_SERVICE        = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
const BLE_CHARACTERISTIC = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';

let bleDevice     = null;
let bleChar       = null;
let saberIsOn     = false;
let activePack    = 1;
let activeColorHex = '#00FF40';

// =========================================
// PALETA DE COLORES (Cristales Kyber)
// =========================================
const CRYSTALS = [
  { name: 'Jedi',      char: 'Obi-Wan',    hex: '#005FFF' },
  { name: 'Sith',      char: 'Vader',      hex: '#FF0000' },
  { name: 'Maestro',   char: 'Mace',       hex: '#9400D3' },
  { name: 'Skywalker', char: 'Luke',       hex: '#00FF40' },
  { name: 'Ahsoka',    char: 'Togruta',    hex: '#00FFFF' },
  { name: 'Nobleza',   char: 'Rey',        hex: '#FFD700' },
];

// =========================================
// PERFILES DE SONIDO
// =========================================
const PACKS = [
  { id:1, name:'JEDI TEMPLE',  desc:'Clásico y noble',     icon:'🔵', cmd:'PACK:1' },
  { id:2, name:'LADO OSCURO',  desc:'Grave y amenazante',  icon:'🔴', cmd:'PACK:2' },
  { id:3, name:'CLONE WARS',   desc:'Agresivo y rápido',   icon:'🟢', cmd:'PACK:3' },
  { id:4, name:'MANDALORIANO', desc:'Etéreo y cristalino', icon:'⚪', cmd:'PACK:4' },
];

// =========================================
// RENDER DE CRISTALES
// =========================================
function buildCrystals() {
  const grid = document.getElementById('crystal-grid');
  CRYSTALS.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'crystal-btn';
    btn.style.setProperty('--crystal-color', c.hex);
    if (i === 3) btn.classList.add('active'); // Luke/Verde por defecto
    btn.innerHTML = `
      <div class="crystal-swatch"></div>
      <div class="crystal-name">${c.name}</div>
      <div class="crystal-char">${c.char}</div>`;
    btn.onclick = () => selectCrystal(btn, c.hex);
    grid.appendChild(btn);
  });
}

function selectCrystal(btn, hex) {
  document.querySelectorAll('.crystal-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyColor(hex);
}

// =========================================
// RENDER DE PACKS DE SONIDO
// =========================================
function buildPacks() {
  const grid = document.getElementById('pack-grid');
  PACKS.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'pack-btn' + (p.id === 1 ? ' active' : '');
    btn.style.setProperty('--pack-icon', `"${p.icon}"`);
    btn.innerHTML = `
      <div class="pack-name">${p.name}</div>
      <div class="pack-desc">${p.desc}</div>
      <div class="pack-active-badge">▶ ACTIVO</div>`;
    btn.onclick = () => selectPack(btn, p);
    grid.appendChild(btn);
  });
}

function selectPack(btn, pack) {
  document.querySelectorAll('.pack-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activePack = pack.id;
  sendCommand(pack.cmd);
  showToast(`Perfil: ${pack.name}`);
}

// =========================================
// COLOR PERSONALIZADO
// =========================================
function applyCustomColor() {
  const hex = document.getElementById('custom-color-picker').value;
  document.querySelectorAll('.crystal-btn').forEach(b => b.classList.remove('active'));
  applyColor(hex);
}

function applyColor(hex) {
  activeColorHex = hex;
  document.documentElement.style.setProperty('--saber-color', hex);
  document.getElementById('saber-blade').style.background =
    `linear-gradient(to top, ${hex}, rgba(255,255,255,0.95) 50%, ${hex})`;
  document.getElementById('saber-blade').style.boxShadow =
    `0 0 8px ${hex}, 0 0 20px ${hex}, 0 0 50px ${hex}, 0 0 80px rgba(255,255,255,0.3)`;
  if (bleChar) sendCommand(hex);
}

// =========================================
// ENCENDIDO / APAGADO
// =========================================
function togglePower() {
  if (!bleChar) { showToast('Sin conexión BLE'); return; }

  if (!saberIsOn) {
    sendCommand('ON');
    saberIsOn = true;
    updateSaberUI(true);
    setTimeout(() => applyColor(activeColorHex), 100);
  } else {
    sendCommand('OFF');
    saberIsOn = false;
    updateSaberUI(false);
  }
}

function updateSaberUI(on) {
  const blade    = document.getElementById('saber-blade');
  const btnPower = document.getElementById('btn-power');
  const stateEl  = document.getElementById('saber-state-text');

  if (on) {
    blade.classList.remove('off');
    btnPower.textContent = 'APAGAR';
    btnPower.classList.add('saber-on');
    stateEl.textContent = 'ACTIVO';
    stateEl.style.color = activeColorHex;
    stateEl.style.textShadow = `0 0 10px ${activeColorHex}`;
  } else {
    blade.classList.add('off');
    blade.style.background = '';
    blade.style.boxShadow  = '';
    btnPower.textContent = 'ENCENDER';
    btnPower.classList.remove('saber-on');
    stateEl.textContent = 'INACTIVO';
    stateEl.style.color = 'var(--accent)';
    stateEl.style.textShadow = '0 0 10px var(--accent)';
  }
}

// =========================================
// BLE — CONEXIÓN
// =========================================
async function connectBLE() {
  if (!navigator.bluetooth) {
    showToast('Bluetooth no disponible en este navegador');
    alert('Usa Chrome en Android. Web Bluetooth no está soportado en iOS Safari ni Firefox.');
    return;
  }

  const btn = document.getElementById('btn-connect');
  const dot  = document.getElementById('conn-dot');
  const lbl  = document.getElementById('conn-label');

  btn.disabled = true;
  dot.className = 'connecting';
  lbl.textContent = 'BUSCANDO...';

  try {
    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [{ name: 'SableLaser' }],
      optionalServices: [BLE_SERVICE]
    });

    lbl.textContent = 'CONECTANDO...';
    bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

    const server  = await bleDevice.gatt.connect();
    const service = await server.getPrimaryService(BLE_SERVICE);
    bleChar        = await service.getCharacteristic(BLE_CHARACTERISTIC);

    // Mostrar pantalla principal
    dot.className = 'connected';
    lbl.textContent = bleDevice.name || 'SABLE';
    document.getElementById('status-device').textContent = bleDevice.name || 'SableLaser';
    document.getElementById('screen-connect').style.display = 'none';
    document.getElementById('screen-main').classList.add('visible');

    showToast('CONEXIÓN ESTABLECIDA');

  } catch (err) {
    dot.className = '';
    lbl.textContent = 'DESCONECTADO';
    btn.disabled = false;
    if (err.name !== 'NotFoundError') {
      showToast('Error de conexión');
    }
  }
}

function onDisconnected() {
  bleChar = null;
  saberIsOn = false;
  const dot = document.getElementById('conn-dot');
  const lbl = document.getElementById('conn-label');
  dot.className = '';
  lbl.textContent = 'DESCONECTADO';
  document.getElementById('screen-connect').style.display = 'flex';
  document.getElementById('screen-main').classList.remove('visible');
  document.getElementById('btn-connect').disabled = false;
  showToast('CONEXIÓN PERDIDA');
}

// =========================================
// ENVIAR COMANDO BLE
// =========================================
async function sendCommand(cmd) {
  if (!bleChar) return;
  try {
    const encoder = new TextEncoder();
    await bleChar.writeValue(encoder.encode(cmd));
    console.log('CMD >', cmd);
  } catch (e) {
    console.warn('Error BLE:', e);
    showToast('Error al enviar');
  }
}

// =========================================
// TOAST
// =========================================
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// =========================================
// RELOJ DE ESTADO
// =========================================
function updateClock() {
  const now = new Date();
  document.getElementById('status-time').textContent =
    now.toTimeString().slice(0,5);
}
setInterval(updateClock, 1000);
updateClock();

// =========================================
// STARFIELD (Canvas)
// =========================================
function initStars() {
  const canvas = document.getElementById('stars-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H, stars = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    stars = Array.from({ length: 140 }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.4 + 0.2,
      a: Math.random(),
      d: (Math.random() - 0.5) * 0.005
    }));
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    stars.forEach(s => {
      s.a += s.d;
      if (s.a < 0.1 || s.a > 1) s.d *= -1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180,220,255,${s.a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize(); draw();
}

// =========================================
// INIT
// =========================================
buildCrystals();
buildPacks();
initStars();
</script>
